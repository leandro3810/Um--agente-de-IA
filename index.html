<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Um Agente de IA</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      padding: 2rem;
      background: #0f172a;
      color: #e2e8f0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin-top: 0;
      color: #38bdf8;
    }
    p {
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: #0ea5e9;
      color: #082f49;
      font-weight: bold;
      margin-right: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .actions {
      margin-top: 1.5rem;
    }
    .button {
      display: inline-block;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      margin-right: 0.6rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Um Agente de IA</h1>
    <p>
      Página inicial do projeto de agente de IA com arquitetura RAG (Retrieval-Augmented Generation),
      pronto para evoluir com API, banco vetorial e integrações com modelos prontos.
    </p>

    <div>
      <span class="tag">Python 3.11+</span>
      <span class="tag">RAG</span>
      <span class="tag">Modelos Prontos</span>
      <span class="tag">Segurança</span>
    </div>

    <div class="actions">
      <a class="button" href="./README.md">Ver documentação</a>
    </div>
  </main>
</body>
</html>
