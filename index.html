<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página inicial do projeto Um Agente de IA com arquitetura RAG e integração com modelos prontos.">
  <title>Um Agente de IA</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
      --bg: #f8fafc;
      --text: #0f172a;
      --card-bg: #ffffff;
      --card-shadow: rgba(15, 23, 42, 0.12);
      --title: #0369a1;
      --tag-bg: #e0f2fe;
      --tag-text: #0c4a6e;
    }
    body {
      margin: 0;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 30px var(--card-shadow);
    }
    h1 {
      margin-top: 0;
      color: var(--title);
    }
    p {
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-weight: bold;
      margin-right: 0.4rem;
      margin-bottom: 0.4rem;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --card-bg: #1e293b;
        --card-shadow: rgba(0, 0, 0, 0.3);
        --title: #38bdf8;
        --tag-bg: #0ea5e9;
        --tag-text: #082f49;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Um Agente de IA</h1>
    <p>
      Página inicial do projeto de agente de IA com arquitetura RAG (Retrieval-Augmented Generation),
      pronto para evoluir com API, banco vetorial e integrações com modelos prontos.
    </p>

    <div>
      <span class="tag">Python</span>
      <span class="tag">RAG</span>
      <span class="tag">Modelos Prontos</span>
      <span class="tag">Segurança</span>
    </div>

  </main>
</body>
</html>
