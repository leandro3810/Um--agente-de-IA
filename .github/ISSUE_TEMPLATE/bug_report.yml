name: Bug report
description: Reporte um problema no projeto
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar este problema.
  - type: input
    id: summary
    attributes:
      label: Resumo
      description: Descreva o problema em uma frase.
      placeholder: Ex.: Erro ao executar `python3 -m src.main`
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Liste os passos em ordem.
      placeholder: |
        1. Rode ...
        2. Abra ...
        3. Veja o erro ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Ambiente
      description: Informe versão do Python, SO e outros detalhes relevantes.
